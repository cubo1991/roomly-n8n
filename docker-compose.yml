version: "3.8"

# ============================================================
# Roomly Stack
# 1. Copiá .env.example → .env y completá los valores
# 2. docker compose up -d
# ============================================================

networks:
  roomly_network:
    driver: bridge

volumes:
  n8n_data:
  postgres_data:
  redis_data:

services:

  # ── n8n (automatización WhatsApp) ────────────────────────
  n8n:
    image: n8nio/n8n
    container_name: n8nNgrok
    restart: unless-stopped
    networks:
      - roomly_network
    ports:
      - "5678:5678"
    environment:
      - N8N_TRUST_PROXY=true
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}
      - NODE_ENV=production
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_TIMEOUT_MAX=600
    volumes:
      - n8n_data:/home/node/.n8n

  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: roomly_postgres
    restart: unless-stopped
    networks:
      - roomly_network
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-roomly}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-roomly_password}
      - POSTGRES_DB=${POSTGRES_DB:-roomly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roomly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: roomly_redis
    restart: unless-stopped
    networks:
      - roomly_network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

